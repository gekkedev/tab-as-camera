name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set release tag
        id: release
        run: echo "tag=build-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: |
          mkdir -p dist
          zip -r "dist/tab-as-camera-${{ steps.release.outputs.tag }}.zip" \
            manifest.json background.js popup.html popup.js README.md LICENSE

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            "dist/tab-as-camera-${{ steps.release.outputs.tag }}.zip" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.release.outputs.tag }}" \
            --notes "Automated release for $GITHUB_SHA"
