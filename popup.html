<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tab as Camera</title>
    <style>
      body {
        font:
          14px system-ui,
          sans-serif;
        width: 310px;
        margin: 0;
        padding: 16px;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 8px;
      }
      p {
        line-height: 1.35;
        margin: 8px 0 12px;
      }
      button {
        width: 100%;
        padding: 10px;
        margin: 5px 0;
        cursor: pointer;
      }
      #status {
        min-height: 42px;
        padding: 9px;
        background: #f3f3f3;
        border-radius: 6px;
        white-space: pre-wrap;
      }
      .small {
        font-size: 12px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>Tab as Camera</h1>
    <p>
      1. Open the tab to broadcast and mark it as the source.<br />2. Open the
      website that wants a camera and enable it there.
    </p>
    <button id="source">Set current tab as source</button
    ><button id="target">Use source as camera in current tab</button
    ><button id="stop">Disable in current tab</button>
    <p id="status">Ready.</p>
    <p class="small">Local only. The extension contains no networking code.</p>
    <script src="popup.js"></script>
  </body>
</html>
